# Публикация образов в Docker Hub из GitHub Actions.
# Для публичных репозиториев минуты стандартных runner обычно не тарифицируются (см. биллинг GitHub).
#
# Обязательные секреты репозитория: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# (hub.docker.com → Account Settings → Security → New Access Token).

name: Publish images to Docker Hub

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Тег образов"
        required: false
        default: "latest"
      next_public_api_url:
        description: "NEXT_PUBLIC_API_URL для сборки Next.js"
        required: false
        default: "http://127.0.0.1:8000"

permissions:
  contents: read

concurrency:
  group: dockerhub-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Проверка секретов Docker Hub
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DH_USER" ] || [ -z "$DH_TOKEN" ]; then
            echo "::error::Добавьте в GitHub → Settings → Secrets and variables → Actions → Secrets:"
            echo "::error::  DOCKERHUB_USERNAME — логин Docker Hub"
            echo "::error::  DOCKERHUB_TOKEN — Access Token (не пароль аккаунта)"
            exit 1
          fi

      - name: Тег и NEXT_PUBLIC_API_URL
        id: meta
        run: |
          USER='${{ secrets.DOCKERHUB_USERNAME }}'
          USER_LC=$(echo "$USER" | tr '[:upper:]' '[:lower:]')
          echo "user_lc=$USER_LC" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG='${{ github.event.inputs.image_tag }}'
            NPURL='${{ github.event.inputs.next_public_api_url }}'
          else
            TAG=latest
            NPURL='${{ vars.NEXT_PUBLIC_API_URL }}'
          fi
          [ -z "$TAG" ] && TAG=latest
          [ -z "$NPURL" ] && NPURL=http://127.0.0.1:8000
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "npurl=$NPURL" >> "$GITHUB_OUTPUT"
          echo "api_image=${USER_LC}/encar-landing-api:${TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=${USER_LC}/encar-landing-web:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.api_image }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.npurl }}
          tags: ${{ steps.meta.outputs.web_image }}
