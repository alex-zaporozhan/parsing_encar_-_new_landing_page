# Публикация образов в GitHub Container Registry (бесплатно, без Docker Hub).
# Триггер: push в main или ручной "Run workflow".
# Токен: GITHUB_TOKEN (packages: write). После первого успешного run в GitHub → Packages появятся контейнеры.

name: Publish images to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Тег образов (например latest)"
        required: false
        default: "latest"
      next_public_api_url:
        description: "NEXT_PUBLIC_API_URL для сборки Next.js (прод — https://api.ваш-домен)"
        required: false
        default: "http://127.0.0.1:8000"

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Compute owner (lowercase), tag, NEXT_PUBLIC_API_URL
        id: meta
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG='${{ github.event.inputs.image_tag }}'
            NPURL='${{ github.event.inputs.next_public_api_url }}'
          else
            TAG=latest
            NPURL='${{ vars.NEXT_PUBLIC_API_URL }}'
          fi
          [ -z "$TAG" ] && TAG=latest
          [ -z "$NPURL" ] && NPURL=http://127.0.0.1:8000
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "npurl=$NPURL" >> "$GITHUB_OUTPUT"
          echo "api_image=ghcr.io/${OWNER}/encar-landing-api:${TAG}" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${OWNER}/encar-landing-web:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.api_image }}

      - name: Build and push Web
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: NEXT_PUBLIC_API_URL=${{ steps.meta.outputs.npurl }}
          tags: ${{ steps.meta.outputs.web_image }}
